<!doctype html>
<html lang="en" dir="ltr" class="bg-background">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{PLUGIN_TITLE}}</title>
  <script>
    // Apply language + dir before the React bundle loads to avoid an LTR-to-RTL
    // flash. Must mirror the resolution logic in
    // @vertesia/ui/i18n's resolveLanguage / isRTL utilities.
    (function () {
      try {
        var supported = ['ar','de','en','es','fr','it','ja','ko','pt','ru','tr','zh','zh-TW'];
        var rtl = ['ar','he','fa','ur'];
        var stored = localStorage.getItem('vertesia-ui-language');
        var navLng = (navigator.language || 'en');
        var raw = stored || navLng;
        var lng = supported.indexOf(raw) >= 0
          ? raw
          : (supported.indexOf(raw.split('-')[0]) >= 0 ? raw.split('-')[0] : 'en');
        document.documentElement.lang = lng;
        document.documentElement.dir = rtl.indexOf(lng.split('-')[0]) >= 0 ? 'rtl' : 'ltr';
      } catch (_e) {}
    })();
  </script>
  <!-- vertesia-react-importmap -->
  <script>
    (() => {
      const reloadParam = '__vertesia_reload';
      const storageKey = 'vertesia:stale-asset-reload';

      function isLocalDevHost() {
        return ['localhost', '127.0.0.1', '0.0.0.0', '::1'].includes(window.location.hostname);
      }

      function reloadOnce() {
        if (isLocalDevHost()) return;

        try {
          const url = new URL(window.location.href);
          const reloadKey = window.location.origin + window.location.pathname;
          const alreadyRetried =
            url.searchParams.has(reloadParam) || window.sessionStorage.getItem(storageKey) === reloadKey;

          if (alreadyRetried) return;

          window.sessionStorage.setItem(storageKey, reloadKey);
          url.searchParams.set(reloadParam, String(Date.now()));
          window.location.replace(url.toString());
        } catch (error) {
          console.error('Failed to recover from stale asset load:', error);
        }
      }

      window.addEventListener('vite:preloadError', (event) => {
        if (typeof event.preventDefault === 'function') event.preventDefault();
        reloadOnce();
      });

      window.addEventListener(
        'error',
        (event) => {
          if (event.target && (event.target.tagName === 'SCRIPT' || event.target.tagName === 'LINK')) {
            reloadOnce();
          }
        },
        true,
      );

      window.addEventListener('load', () => {
        try {
          const url = new URL(window.location.href);
          if (!url.searchParams.has(reloadParam)) return;
          url.searchParams.delete(reloadParam);
          window.history.replaceState(window.history.state, document.title, url.pathname + url.search + url.hash);
        } catch (_error) {}
      });
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/ui/main.tsx"></script>
</body>

</html>
