packages:
  - llumiverse/common
  - packages/*
  - "!packages/memory"
  - "!packages/memory-cli"
  - "!packages/memory-commands"
  - libraries/*
  - libraries/koa-stack/*
  - templates/*
  - "!templates/worker-template"
verifyDepsBeforeRun: false
allowBuilds:
  '@firebase/util': true
  '@swc/core': true
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
blockExoticSubdeps: true
minimumReleaseAge: 4320 # 3 days in minutes, minimumReleaseAge protects against supply chain attacks.
minimumReleaseAgeStrict: true
minimumReleaseAgeExclude:
  - "@vertesia/*"
  - "@llumiverse/*"
  # Renovate security update: vitest@4.1.0
  - vitest@4.1.0
overrides:
  react: "19.2.3"
  react-dom: "19.2.3"
  "@types/react": "19.2.3"
  "@types/react-dom": "19.2.3"
  "brace-expansion@>=4.0.0 <5.0.6": "^5.0.6"
  "brace-expansion@>=3.0.0 <4.0.0": "maintenance-v3"
  "brace-expansion@>=2.0.0 <3.0.0": "maintenance-v2"
  "brace-expansion@<2.0.0": "maintenance-v1"
  "@isaacs/brace-expansion@>=5.0.0 <6.0.0": "^5.0.1"
  "cross-spawn@<6.0.6": "^7.0.6"
  "esbuild@<0.25.0": "^0.28.0"
  "glob@>=10.2.0 <10.5.0": "^13.0.6"
  "js-yaml@>=4.0.0 <4.1.1": "^4.1.1"
  # Safety net: if a transitive dep ever pulls in koa 2, force it to 3.
  # Packages directly declare koa@^3.2.0 — this guards against regressions.
  "koa@<3.0.0": "^3.2.0"
  "@types/koa@<3.0.0": "^3.0.3"
  "@hono/node-server@<1.19.10": "^2.0.4"
  "hono@<4.12.14": "^4.12.19"
  "serialize-javascript@<7.0.3": "^7.0.5"
  "tmp@<0.2.6": "^0.2.6"
  "dompurify@<=3.3.3": "^3.4.5"
  "undici@>=6.0.0 <6.21.3": "7.20.0"
  vite: "$vite"
  is-generator-function: "1.1.2"
  "mdast-util-to-hast@>=13.0.0 <13.2.1": "^13.2.1"
  "jws@>=3.0.0 <3.2.3": "^4.0.1"
  "jws@>=4.0.0 <4.0.1": "^4.0.1"
  "qs@>=6.0.0 <=6.15.1": "^6.15.2"
  "lodash-es@<4.18.1": "^4.18.1"
  "lodash@<4.18.1": "^4.18.1"
  "fast-xml-parser@<5.7.2": "^5.8.0"
  "@eslint/config-array": "^0.23.3"
  "minimatch@>=3.0.0 <4.0.0": "legacy-v3"
  "minimatch@>=5.0.0 <6.0.0": "legacy-v5"
  "minimatch@>=9.0.0 <10.0.0": "legacy-v9"
  "minimatch@>=10.0.0 <11.0.0": "^10.2.5"
  "diff@>=4.0.0 <5.0.0": "^9.0.0"
  "diff@>=5.0.0 <5.2.2": "^9.0.0"
  "diff@>=6.0.0 <8.0.3": "^9.0.0"
  "ajv@>=6.0.0 <6.14.0": "^8.20.0"
  "@types/node": "^24.12.4"
  "flatted@<3.4.2": "^3.4.2"
  "yaml@>=2.0.0 <2.8.3": "^2.9.0"
  "picomatch@<2.3.2": "^4.0.4"
  "picomatch@>=4.0.0 <4.0.4": "^4.0.4"
  "protobufjs@<=7.5.7": "^8.4.2"
  "postcss@<8.5.10": "^8.5.15"
  "uuid@>=11.0.0 <11.1.1": "^14.0.0"
  "fast-xml-builder@<=1.1.6": "^1.2.0"
  "fast-uri@<=3.1.1": "^3.1.2"
  "mermaid@>=11.0.0-alpha.1 <=11.14.0": "^11.15.0"
  "@protobufjs/utf8@<=1.1.0": "^1.1.1"
