packages:
  - llumiverse/common
  - packages/*
  - libraries/*
  - libraries/koa-stack/*
  - templates/*
  - "!templates/worker-template"
verifyDepsBeforeRun: false
allowBuilds:
  '@firebase/util': true
  '@swc/core': true
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
blockExoticSubdeps: true
minimumReleaseAge: 4320 # 3 days in minutes, minimumReleaseAge protects against supply chain attacks.
minimumReleaseAgeStrict: true
minimumReleaseAgeExclude:
  - "@vertesia/*"
  - "@llumiverse/*"
  # Additional excludes, due to CVEs etc.
  # Nothing for now
catalog:
  react: "19.2.7"
  react-dom: "19.2.7"
  "@types/node": "^24.13.3"
  "@types/react": "19.2.17"
  "@types/react-dom": "19.2.3"
  vite: "8.1.0"
  rolldown: "1.1.5"
overrides:
  # ============================
  # Special Overrides
  # ============================
  # We have these for more than simple CVE fixes, but may also do that. Or have complex requirements to track.
  # There must only be 1 react
  react: "catalog:"
  react-dom: "catalog:"
  "@types/node": "catalog:"
  "@types/react": "catalog:"
  "@types/react-dom": "catalog:"


  # Safety net: if a transitive dep ever pulls in koa 2, force it to 3.
  # Packages directly declare koa@^3.2.0 — this guards against regressions.
  "koa@<3.2.1": "^3.2.1"
  "@types/koa@<3.0.3": "^3.0.3"

  # Pin single vite
  vite: "catalog:"

  # ============================
  # Standard CVE overrides
  # ============================
  "@ungap/structured-clone@<=1.3.0": ^1.3.1 #CWE-502 and package deprecation, won't show as CVE.
  diff@>=6.0.0 <8.0.3: ^8.0.3
  dompurify@<=3.4.10: ^3.4.11
  # Tilde (not caret) so @firebase/firestore stays on its ~1.9 line and @temporalio/* on 1.14.
  "@grpc/grpc-js@<1.9.16": ~1.9.16
  "@grpc/grpc-js@>=1.14.0 <1.14.4": ~1.14.4
  form-data@>=4.0.0 <4.0.6: ^4.0.6
  js-yaml@>=4.0.0 <4.2.0: ^4.2.0
  protobufjs@<=7.6.2: ^7.6.3
  serialize-javascript@<=7.0.2: ^7.0.3
  serialize-javascript@>=5.0.0 <7.0.5: ^7.0.5
