packages:
  - llumiverse/common
  - packages/*
  - "!packages/memory"
  - "!packages/memory-cli"
  - "!packages/memory-commands"
  - templates/*
  - "!templates/worker-template"
minimumReleaseAge: 4320 # 3 days in minutes, minimumReleaseAge protects against supply chain attacks.
minimumReleaseAgeExclude:
  - '@vertesia/*'
  - '@llumiverse/*'
  - 'mermaid@11.15.0'
  - '@mermaid-js/parser@1.1.1'
  - 'pnpm@11.1.2'
