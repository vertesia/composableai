packages:
  - llumiverse/common
  - packages/*
  - "!packages/memory"
  - "!packages/memory-cli"
  - "!packages/memory-commands"
  - libraries/*
  - libraries/koa-stack/*
  - templates/*
  - "!templates/worker-template"
verifyDepsBeforeRun: false
allowBuilds:
  '@firebase/util': true
  '@swc/core': true
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
blockExoticSubdeps: true
minimumReleaseAge: 4320 # 3 days in minutes, minimumReleaseAge protects against supply chain attacks.
minimumReleaseAgeStrict: true
minimumReleaseAgeExclude:
  - "@vertesia/*"
  - "@llumiverse/*"
  # Renovate security update: undici@7.28.0
  - undici@7.28.0
  # Additional excludes, due to CVEs etc.
  # Nothing for now
overrides:
  # ============================
  # Special Overrides
  # ============================
  # We have these for more than simple CVE fixes, but may also do that. Or have complex requirements to track.
  # There must only be 1 react
  react: "19.2.7"
  react-dom: "19.2.7"
  "@types/react": "19.2.17"
  "@types/react-dom": "19.2.3"

  # TODO: review if these are special cases
  "cross-spawn@<6.0.6": "^7.0.6"
  is-generator-function: "1.1.2"

  # Safety net: if a transitive dep ever pulls in koa 2, force it to 3.
  # Packages directly declare koa@^3.2.0 — this guards against regressions.
  "koa@<3.0.0": "^3.2.1"
  "@types/koa@<3.0.0": "^3.0.3"

  # Pin single vite, source is root package.json
  vite: "$vite"

  # ============================
  # Standard CVE overrides
  # ============================
  diff@>=6.0.0 <8.0.3: ^8.0.3
  dompurify@<3.4.9: ^3.4.9
  protobufjs@<=7.6.2: ^7.6.3
  serialize-javascript@<=7.0.2: ^7.0.3
  serialize-javascript@>=5.0.0 <7.0.5: ^7.0.5
