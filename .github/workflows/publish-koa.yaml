name: (publish) NPM koa-stack packages

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release Type
        required: true
        type: choice
        options:
          - snapshot
          - release
        default: snapshot
      bump_type:
        description: Version Bump
        required: true
        type: choice
        options:
          - keep
          - patch
          - minor
        default: keep
      dry_run:
        description: Dry Run
        required: true
        type: boolean
        default: true

# Serialize publish runs so two concurrent dispatches don't race on the shared
# npm registry or push competing version bumps. The group is shared with
# publish-npm.yaml (same string) because both workflows commit and push version
# bumps to the same ref — serializing them keeps git pushes fast-forward.
concurrency:
  group: publish-packages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish all koa-stack packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Scopes DEPLOY_KEY (used to push version bumps past branch protection)
    # to a dedicated environment.
    environment: build
    permissions:
      id-token: write # required for OIDC between GitHub and NPM
      contents: write # required to push version-bump commits for preview
    steps:
      - name: Checkout repository
        # persist-credentials must stay true so the DEPLOY_KEY SSH config survives
        # into the publish step, where the script runs `git push origin "$REF"` to
        # push the version-bump commit past branch protection. With it false, the
        # push fails with "git@github.com: Permission denied (publickey)".
        # zizmor: ignore[artipacked] deploy key is scoped to the `build` environment.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
          ssh-key: ${{ secrets.DEPLOY_KEY }} # Use deploy key to bypass branch protection rules
          persist-credentials: true

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      # Ensure npm 11.5.1 or later is installed
      - name: Update npm
        run: npm install -g npm@latest
      - name: Verify npm version
        run: npm --version

      - name: Install workspace dependencies
        timeout-minutes: 5
        run: pnpm install

      # Publishes @koa-stack/* (libraries/koa-stack/*) on their own version line.
      # Reuses the shared publish-all-packages.sh via --scope koa-stack.
      - name: Publish all packages
        timeout-minutes: 15
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
          BUMP_TYPE: ${{ inputs.bump_type }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          ./.github/bin/publish-all-packages.sh \
              --scope koa-stack \
              --ref "${GITHUB_REF_NAME}" \
              --release-type "${RELEASE_TYPE}" \
              --bump-type "${BUMP_TYPE}" \
              --dry-run "${DRY_RUN}"
