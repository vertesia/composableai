name: (test) Build and test

on:
  - push

# Cancel superseded runs on the same branch (latest push wins). Each branch
# still gets its own concurrent run, so main/preview/PR pushes don't block
# each other.
concurrency:
  group: composable-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: "pnpm"
      - name: Install pandoc
        uses: pandoc/actions/setup@86321b6dd4675f5014c611e05088e10d4939e09e # v1.1.1
      - name: Install native test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick mupdf-tools
        shell: bash
      - name: Install workspace dependencies
        timeout-minutes: 5
        run: pnpm install
      - name: Build workspace
        timeout-minutes: 10
        run: pnpm build
      - name: Typecheck and run package tests
        timeout-minutes: 10
        run: pnpm ci:test

  template-smoke-test:
    name: Template smoke test (Plugin)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: "pnpm"
      - name: Install workspace dependencies
        timeout-minutes: 5
        run: pnpm install
      - name: Build workspace
        timeout-minutes: 10
        run: pnpm build
      - name: Template integration test - Plugin
        timeout-minutes: 10
        run: ./.github/bin/test-template-integration.sh --release-type snapshot --template "Vertesia Plugin"

  notify-repo-studio:
    name: Notify vertesia/studio of new commit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/preview' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/repo-dispatch'))
    needs:
      - unit-tests
      - template-smoke-test
    # Scopes the cross-repo dispatch token to a dedicated environment.
    environment: build
    steps:
      - name: Notify repository vertesia/studio
        env:
          REPO_STUDIO_ACCESS_TOKEN: ${{ secrets.REPO_STUDIO_ACCESS_TOKEN }}
          COMPOSABLEAI_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          SENDER: ${{ github.actor }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${REPO_STUDIO_ACCESS_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --fail-with-body \
            https://api.github.com/repos/vertesia/studio/dispatches \
            -d "$(jq -nc \
              --arg sha "${COMPOSABLEAI_SHA}" \
              --arg branch "${BRANCH}" \
              --arg sender "${SENDER}" \
              '{event_type: "update-git-submodule-request", client_payload: {composableai_sha: $sha, branch: $branch, sender: $sender}}')"
