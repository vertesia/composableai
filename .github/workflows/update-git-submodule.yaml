name: (sync) Update Git submodule

on:
  repository_dispatch:
    types:
      - update-git-submodule-request
  workflow_dispatch:
    inputs:
      llumiverse_sha:
        # example: "d4c748957db4ac812565cf99e00b11a7ede97bc7"
        description: "The commit SHA of vertesia/llumiverse to update"
        required: true
      branch:
        # example: "main" or "preview"
        #   (don't use "refs/heads/main" or "refs/heads/preview")
        description: "The branch to update the submodule in"
        required: true
        default: "main"

env:
  TARGET_LLUMIVERSE_SHA: ${{ inputs.llumiverse_sha || github.event.client_payload.llumiverse_sha }}
  TARGET_LLUMIVERSE_URL: https://github.com/vertesia/llumiverse/commit/${{ inputs.llumiverse_sha || github.event.client_payload.llumiverse_sha }}
  TARGET_COMPOSABLEAI_BRANCH: ${{ inputs.branch || github.event.client_payload.branch }}

concurrency:
  # Serialize runs targeting the same branch so two simultaneous dispatches
  # don't race on PR cleanup or push competing temp branches.
  group: update-git-submodule-${{ inputs.branch || github.event.client_payload.branch }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update-submodule:
    name: Update submodule
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Scopes secrets (GITHUB_TOKEN, REPO_STUDIO_ACCESS_TOKEN) to a dedicated
    # environment (zizmor: secrets-outside-env).
    environment: build
    permissions:
      contents: write       # required for pushing the temp branch and deleting old branches
      pull-requests: write  # required for creating new PRs and closing superseded ones
    steps:
      - name: Validate branch
        run: |
          if [[ "${TARGET_COMPOSABLEAI_BRANCH}" != "main" && "${TARGET_COMPOSABLEAI_BRANCH}" != "preview" ]]; then
            echo "::error::Invalid branch '${TARGET_COMPOSABLEAI_BRANCH}'. Only 'main' and 'preview' branches are supported."
            exit 1
          fi
          echo "Branch '${TARGET_COMPOSABLEAI_BRANCH}' is valid."

      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
          fetch-depth: 0 # Fetch all history to ensure we can access the specified commit
          ref: ${{ env.TARGET_COMPOSABLEAI_BRANCH }}
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Check if submodule update is needed
        id: precheck
        run: |
          current_llumiverse_sha="$(git ls-tree --format='%(objectname)' HEAD llumiverse)"

          if [ "$current_llumiverse_sha" = "${TARGET_LLUMIVERSE_SHA}" ]; then
            echo "No update needed. Submodule 'llumiverse' is already at target SHA."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Submodule update required."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Clean up existing PRs
        if: ${{ steps.precheck.outputs.skip != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching pull requests with labels: [branch:${TARGET_COMPOSABLEAI_BRANCH}] and [workflow:update-llumiverse]..."
          pr_list=$(gh pr list \
            --repo vertesia/composableai \
            --label branch:${TARGET_COMPOSABLEAI_BRANCH} \
            --label workflow:update-llumiverse \
            --state open \
            --json number,title \
            --jq '.[] | "\(.number) \(.title)"')

          if [ -z "$pr_list" ]; then
            echo "No matching pull requests found."
            exit 0
          fi

          # Show PRs to be closed
          echo "Found PRs:"
          echo "$pr_list"
          echo ""

          # Close each PR
          echo "Closing PRs..."
          while read -r pr_line; do
            pr_number=$(echo "$pr_line" | cut -d' ' -f1)
            pr_title=$(echo "$pr_line" | cut -d' ' -f2-)
            echo "Closing PR #${pr_number} ${pr_title}..."

            gh pr comment "$pr_number" \
                --repo vertesia/composableai \
                --body "Closing this pull request automatically as a new commit ${TARGET_LLUMIVERSE_URL} appeared."

            gh pr close "$pr_number" --repo vertesia/composableai --delete-branch
          done <<< "$pr_list"

          echo "Done."

      - name: Update Git submodule and lockfile
        id: update-submodule
        if: ${{ steps.precheck.outputs.skip != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          export TARGET_LLUMIVERSE_MSG="$(git -C llumiverse log --format="%cd: %s by %an" --date=short -1 $TARGET_LLUMIVERSE_SHA)"
          export TARGET_LLUMIVERSE_EMAIL="$(git -C llumiverse log --format="%ae" -1 $TARGET_LLUMIVERSE_SHA)"

          # Extract the pull request number if it exists, such as:
          #   - "Fix important bug in workflow (#123)" => "123"
          #   - "Update dependencies" => ""
          export MAYBE_LLUMIVERSE_PR="$(echo $TARGET_LLUMIVERSE_MSG | grep -oP '(?<=#)\d+')"
          export TEMP_BRANCH="sync-llumiverse-${TARGET_LLUMIVERSE_SHA::7}"

          cat << EOF >> $GITHUB_STEP_SUMMARY
          Type   | Item              | Value
          :----- | :---------------- | :---------------
          Target | llumiverse commit | ([\`${TARGET_LLUMIVERSE_SHA}\`](${TARGET_LLUMIVERSE_URL})): ${TARGET_LLUMIVERSE_MSG}
          Target | llumiverse PR     | ${MAYBE_LLUMIVERSE_PR:-"N/A"}
          Other  | Temporary branch  | \`${TEMP_BRANCH}\`
          EOF

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git checkout -b $TEMP_BRANCH

          echo "Updating submodule [llumiverse] to ${TARGET_LLUMIVERSE_SHA::7}..." >&2
          cd llumiverse
          git checkout $TARGET_LLUMIVERSE_SHA

          echo "Committing changes in [composableai]..." >&2
          cd ..
          git add llumiverse
          git commit -m "Update llumiverse submodule to ${TARGET_LLUMIVERSE_SHA::7}"

          pnpm install --lockfile-only
          pnpm dedupe
          # Check for changes in the lockfile
          if git diff --quiet; then
            echo "No changes to lockfile: skipping commit" >&2
          else
            git add pnpm-lock.yaml
            git commit --amend --no-edit
            echo "Lockfile updated" >&2
          fi

          # Push the branch over SSH with the deploy key rather than GITHUB_TOKEN.
          # Pushes authenticated with GITHUB_TOKEN do not trigger `on: push`
          # workflows (GitHub's recursion guard), so the (test) Build and test and
          # (lint) Lint codebase checks would never run on the sync branch. A
          # deploy-key push is a regular push and does trigger them, which is what
          # the automerge-llumiverse workflow gates on. The PR itself is still
          # created below with GITHUB_TOKEN so its author stays github-actions,
          # distinct from the automerge app that later approves it.
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t rsa,ecdsa,ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            git push "git@github.com:${GITHUB_REPOSITORY}.git" "$TEMP_BRANCH"

          pr_body=$(cat <<EOF
          This PR updates the llumiverse submodule to ${TARGET_LLUMIVERSE_URL}. It was generated by [GitHub Actions](https://github.com/vertesia/composableai/actions/runs/${GITHUB_RUN_ID:-0}).
          EOF
          )

          if [ -n "$MAYBE_LLUMIVERSE_PR" ]; then
            pr_body+="

            This update corresponds to the following PR:
            - https://github.com/vertesia/llumiverse/pull/${MAYBE_LLUMIVERSE_PR}."
          else
            pr_body+="

            This update does not correspond to any specific PR in llumiverse."
          fi

          new_pr_url=$(gh pr create \
              --title "chore: update llumiverse to ${TARGET_LLUMIVERSE_SHA::7}" \
              --body "${pr_body}" \
              --base "${TARGET_COMPOSABLEAI_BRANCH}" \
              --head "${TEMP_BRANCH}" \
              --label "branch:${TARGET_COMPOSABLEAI_BRANCH}" \
              --label "workflow:update-llumiverse")
          new_pr_number=$(echo "$new_pr_url" | grep -oP '(?<=pull/)\d+')

          echo "new_pr_url=${new_pr_url}" >> $GITHUB_OUTPUT
          echo "new_pr_number=${new_pr_number}" >> $GITHUB_OUTPUT

          echo "PR created: ${new_pr_url}"

          # We intentionally avoid exposing commit email addresses in public workflow logs.
          author_login=$(gh api repos/vertesia/llumiverse/commits/${TARGET_LLUMIVERSE_SHA} --jq '.author.login // empty')
          echo "author_login=${author_login}" >> $GITHUB_OUTPUT

      - name: Assign PR to author
        if: ${{ steps.precheck.outputs.skip != 'true' && steps.update-submodule.outputs.author_login }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STEPS_UPDATE_SUBMODULE_OUTPUTS_NEW_PR_NUMBER: ${{ steps.update-submodule.outputs.new_pr_number }}
          STEPS_UPDATE_SUBMODULE_OUTPUTS_AUTHOR_LOGIN: ${{ steps.update-submodule.outputs.author_login }}
        run: |
          gh pr edit "${STEPS_UPDATE_SUBMODULE_OUTPUTS_NEW_PR_NUMBER}" \
            --add-assignee "${STEPS_UPDATE_SUBMODULE_OUTPUTS_AUTHOR_LOGIN}"

      - name: Notify studio for Slack notification
        # Dispatch to the private studio repo so it can look up the developer's
        # Slack address without exposing private email mappings in this public repo.
        if: ${{ steps.precheck.outputs.skip != 'true' && steps.update-submodule.outputs.author_login }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${REPO_STUDIO_ACCESS_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --fail-with-body \
            https://api.github.com/repos/vertesia/studio/dispatches \
            -d '{
              "event_type": "composableai-pr-notification",
              "client_payload": {
                "github_login": "${STEPS_UPDATE_SUBMODULE_OUTPUTS_AUTHOR_LOGIN}",
                "message": "Please review this PR which brings your llumiverse changes to composableai: ${STEPS_UPDATE_SUBMODULE_OUTPUTS_NEW_PR_URL}"
              }
            }'
        env:
          REPO_STUDIO_ACCESS_TOKEN: ${{ secrets.REPO_STUDIO_ACCESS_TOKEN }}
          STEPS_UPDATE_SUBMODULE_OUTPUTS_AUTHOR_LOGIN: ${{ steps.update-submodule.outputs.author_login }}
          STEPS_UPDATE_SUBMODULE_OUTPUTS_NEW_PR_URL: ${{ steps.update-submodule.outputs.new_pr_url }}
